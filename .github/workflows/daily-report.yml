name: Daily MLB Analysis

on:
  schedule:
    # 11:00 UTC = ~7am US Eastern (DST) / ~6am Eastern (standard time),
    # well before the day's first pitch.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "mlb-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily MLB analysis: $(date -u +%Y-%m-%d)"
            git push
          fi
