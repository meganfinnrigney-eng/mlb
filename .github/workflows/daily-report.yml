name: Daily MLB Analysis

on:
  schedule:
    # 14:00 UTC = ~7am Pacific / ~10am Eastern (DST) - checked empirically
    # that MoundEdge's daily page still shows the *previous* day's slate as
    # late as 4am Eastern, so this runs later than "well before first pitch"
    # would technically require, to give the source more time to refresh.
    # If it's still occasionally stale at this hour, the report says so
    # explicitly (see source_date_stale in main.py) rather than silently
    # showing yesterday's games.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "mlb-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          if [ -f mlb_daily/report/inline_fonts.cache.css ]; then
            git add mlb_daily/report/inline_fonts.cache.css
          fi
          # covers predictions_log.csv, results_log.csv, and anything else
          # the tracker writes there in the future - listing files
          # individually here is exactly the bug that silently dropped
          # predictions_log.csv commits until it was caught and fixed
          git add mlb_daily/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily MLB analysis: $(date -u +%Y-%m-%d)"
            git push
          fi
