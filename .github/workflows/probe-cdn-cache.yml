name: Probe CDN Cache Behavior

# Temporary diagnostic for a user report of persistently seeing a stale
# version of the live report (even in incognito) despite the origin
# serving fresh content per our own probes. Checks: does the BARE url
# (no cache-busting, what a real visitor actually requests) behave
# differently from a cache-busted one? Does /mlb/ vs /mlb/index.html
# differ? Does hitting it twice in a row show a cache HIT the second
# time? Safe to delete once diagnosed.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Bare URL, first fetch
        run: |
          echo "--- GET /mlb/ (no cache-bust), fetch 1 ---"
          curl -sS -D - -o /tmp/bare1.html "https://meganfinnrigney-eng.github.io/mlb/" | grep -iE "^(HTTP|cache-control|age|x-cache|x-proxy-cache|etag|last-modified|x-served-by):"
          grep -c 'class="team-chip"' /tmp/bare1.html || true
          grep -c 'Track Record' /tmp/bare1.html || true

      - name: Bare URL, second fetch (simulate a real repeat visit)
        run: |
          echo "--- GET /mlb/ (no cache-bust), fetch 2 ---"
          curl -sS -D - -o /tmp/bare2.html "https://meganfinnrigney-eng.github.io/mlb/" | grep -iE "^(HTTP|cache-control|age|x-cache|x-proxy-cache|etag|last-modified|x-served-by):"
          grep -c 'class="team-chip"' /tmp/bare2.html || true
          grep -c 'Track Record' /tmp/bare2.html || true

      - name: Explicit /mlb/index.html
        run: |
          echo "--- GET /mlb/index.html ---"
          curl -sS -D - -o /tmp/explicit.html "https://meganfinnrigney-eng.github.io/mlb/index.html" | grep -iE "^(HTTP|cache-control|age|x-cache|x-proxy-cache|etag|last-modified|x-served-by):"
          grep -c 'class="team-chip"' /tmp/explicit.html || true
          grep -c 'Track Record' /tmp/explicit.html || true

      - name: No-trailing-slash /mlb (redirect check)
        run: |
          echo "--- GET /mlb (no trailing slash) ---"
          curl -sS -D - -o /tmp/noslash.html -L "https://meganfinnrigney-eng.github.io/mlb" | grep -iE "^(HTTP|location|cache-control|age|x-cache):"

      - name: Diff bare1 vs bare2 vs explicit
        run: |
          echo "bare1 vs bare2 identical: $(cmp -s /tmp/bare1.html /tmp/bare2.html && echo yes || echo no)"
          echo "bare1 vs explicit identical: $(cmp -s /tmp/bare1.html /tmp/explicit.html && echo yes || echo no)"
