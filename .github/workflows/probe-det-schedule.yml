name: Probe DET Schedule

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Full schedule for today (all games)
        run: |
          curl -sS "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=2026-07-23&hydrate=team" -o /tmp/sched.json
          python3 - << 'PYEOF'
          import json
          data = json.load(open('/tmp/sched.json'))
          for d in data.get('dates', []):
              print("DATE:", d.get('date'), "total games:", len(d.get('games', [])))
              for g in d.get('games', []):
                  away = g['teams']['away']['team'].get('name','')
                  home = g['teams']['home']['team'].get('name','')
                  print(f"  gamePk={g.get('gamePk')} gameNumber={g.get('gameNumber')} {away} @ {home}  gameDate={g.get('gameDate')} status={g.get('status',{}).get('detailedState')}")
          PYEOF
      - name: Check yesterday for SFG/KCR
        run: |
          curl -sS "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=2026-07-22&hydrate=team" -o /tmp/sched2.json
          python3 - << 'PYEOF'
          import json
          data = json.load(open('/tmp/sched2.json'))
          for d in data.get('dates', []):
              print("DATE:", d.get('date'), "total games:", len(d.get('games', [])))
              for g in d.get('games', []):
                  away = g['teams']['away']['team'].get('name','')
                  home = g['teams']['home']['team'].get('name','')
                  print(f"  gamePk={g.get('gamePk')} gameNumber={g.get('gameNumber')} {away} @ {home}  gameDate={g.get('gameDate')}")
          PYEOF
