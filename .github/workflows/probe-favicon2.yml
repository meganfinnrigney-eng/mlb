name: Probe Favicon v2 Live

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch favicon.ico and compare against repo copy
        run: |
          curl -sS -D - -o /tmp/favicon.ico "https://meganfinnrigney-eng.github.io/mlb/favicon.ico"
          file /tmp/favicon.ico
          md5sum /tmp/favicon.ico
      - name: Fetch favicon-32x32.png
        run: |
          curl -sS -D - -o /tmp/favicon32.png "https://meganfinnrigney-eng.github.io/mlb/favicon-32x32.png"
          file /tmp/favicon32.png
          md5sum /tmp/favicon32.png
      - name: Fetch apple-touch-icon.png
        run: |
          curl -sS -D - -o /tmp/apple.png "https://meganfinnrigney-eng.github.io/mlb/apple-touch-icon.png"
          file /tmp/apple.png
          md5sum /tmp/apple.png
