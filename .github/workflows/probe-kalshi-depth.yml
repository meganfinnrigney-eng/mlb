name: Probe Kalshi Market Depth

# Temporary, one-off dump of Kalshi's raw market JSON (bid/ask/volume
# fields) to design the liquidity-depth Kalshi section against real field
# names instead of guessing - reuses probe_sources.py's existing
# probe_kalshi() without running its other probes (notably the
# rate-limit-sensitive Reddit RSS one). Safe to delete once done.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Probe Kalshi raw market objects
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from scripts.probe_sources import probe_kalshi
          probe_kalshi()
          "
