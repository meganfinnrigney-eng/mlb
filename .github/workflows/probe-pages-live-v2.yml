name: Probe Live Pages URL v2

# Temporary, one-off check that the new features (totals magnitude, Track
# Record, Kalshi Market Depth) are actually live at
# https://meganfinnrigney-eng.github.io/mlb/, fetched from a real GitHub
# Actions runner since this dev sandbox can't reach github.io directly.
# Safe to delete once confirmed.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live page (headers + content checks)
        run: |
          curl -sS -D /tmp/headers.txt -o /tmp/live.html "https://meganfinnrigney-eng.github.io/mlb/?cachebust=$(date +%s)"
          echo "===== RESPONSE HEADERS ====="
          cat /tmp/headers.txt
          echo
          echo "===== PAGE SIZE ====="
          wc -l /tmp/live.html
          echo
          echo "===== TITLE ====="
          grep -o '<title>[^<]*</title>' /tmp/live.html
          echo
          echo "===== NEW FEATURE PRESENCE ====="
          echo "depth-row count: $(grep -c 'class=\"depth-row\"' /tmp/live.html || true)"
          echo "thin-tag count: $(grep -c 'class=\"thin-tag\"' /tmp/live.html || true)"
          echo "Track Record mentions: $(grep -c 'Track Record' /tmp/live.html || true)"
          echo "'runs (avg)' mentions: $(grep -c 'runs (avg)' /tmp/live.html || true)"
          echo "contracts traded mentions: $(grep -c 'contracts traded, last 24h' /tmp/live.html || true)"
