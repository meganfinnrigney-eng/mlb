name: Probe Paste Worker

# Temporary, one-off verification that the Cloudflare Worker behind
# docs/paste.html is deployed, reachable, and correctly enforcing its
# password gate - run manually right after deploying the Worker. Does NOT
# know the real PASTE_SECRET (nobody but the repo owner does, on purpose -
# see cf-worker/reddit-paste-worker.js), so it can only prove the Worker
# is live and rejecting bad requests correctly, not exercise the actual
# write path. Safe to delete once the Worker's deployment is confirmed.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: OPTIONS preflight (expect 204 + CORS header)
        run: |
          curl -sS -i -X OPTIONS https://mlbpasteworker.meganfinn-rigney.workers.dev

      - name: POST with wrong password (expect 401, not 500 - proves both secrets are set)
        run: |
          curl -sS -i -X POST https://mlbpasteworker.meganfinn-rigney.workers.dev \
            -H "Content-Type: application/json" \
            -d '{"password":"definitely-wrong-probe-password","text":"probe text","date":"2099-01-01"}'

      - name: GET (expect 405 method not allowed)
        run: |
          curl -sS -i -X GET https://mlbpasteworker.meganfinn-rigney.workers.dev
