name: Probe Content Width Live

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live index.html and check max-width
        run: |
          curl -sS "https://meganfinnrigney-eng.github.io/mlb/" -o /tmp/live.html
          echo "--- max-width value in live CSS ---"
          grep -o "max-width: [0-9]*px; margin: 0 auto" /tmp/live.html | head -3
