<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paste Reddit Thread</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         max-width: 640px; margin: 40px auto; padding: 0 20px 60px; line-height: 1.45; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .hint { color: #777; font-size: 13px; margin-bottom: 24px; }
  .hint code { font-size: 12px; }
  label { display: block; font-weight: 600; font-size: 13px; margin: 16px 0 4px; }
  input, textarea { width: 100%; box-sizing: border-box; font: inherit; padding: 8px 10px;
    border: 1px solid #999; border-radius: 6px; background: transparent; color: inherit; }
  textarea { resize: vertical; }
  button { margin-top: 18px; padding: 10px 20px; font: inherit; font-weight: 600; border-radius: 6px;
    border: none; background: #2c5e38; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  #status { margin-top: 14px; font-size: 14px; min-height: 1.2em; }
  #status.ok { color: #2c5e38; font-weight: 600; }
  #status.err { color: #a71930; font-weight: 600; }
</style>
</head>
<body>

<h1>Paste Today's Reddit Thread</h1>
<div class="hint">
  Saves directly into <code>mlb_daily/data/reddit_manual_&lt;date&gt;.txt</code> in the repo -
  the exact manual-fallback file the daily report already checks for full comment-level Reddit
  sentiment. This page can only write that one file; it does nothing else in the repo.
</div>

<label for="date">Date</label>
<input type="date" id="date">

<label for="password">Access code</label>
<input type="password" id="password" autocomplete="off" placeholder="only you know this">

<label for="text">Thread text</label>
<textarea id="text" rows="14" placeholder="Paste the daily thread's text here (title, OP, comments - whatever you copied)."></textarea>

<button id="save">Save</button>
<div id="status"></div>

<script>
  // Set this once, after deploying cf-worker/reddit-paste-worker.js - see that
  // file's header comment for exact deploy steps. Everything else on this page
  // is static; the Worker is the only thing that holds real GitHub write access.
  const WORKER_URL = "https://mlbpasteworker.meganfinn-rigney.workers.dev";

  const dateInput = document.getElementById("date");
  const passwordInput = document.getElementById("password");
  const textInput = document.getElementById("text");
  const statusEl = document.getElementById("status");
  const saveBtn = document.getElementById("save");

  // Default to today in US/Eastern, matching how the report itself dates the
  // slate - override the date field manually if pasting for a different day.
  dateInput.value = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());

  saveBtn.addEventListener("click", async () => {
    const password = passwordInput.value;
    const text = textInput.value;
    const date = dateInput.value;

    if (!password || !text.trim()) {
      statusEl.textContent = "Enter the access code and paste some text first.";
      statusEl.className = "err";
      return;
    }

    saveBtn.disabled = true;
    statusEl.textContent = "Saving…";
    statusEl.className = "";

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password, text, date }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        statusEl.textContent = `Saved for ${data.date}.`;
        statusEl.className = "ok";
        textInput.value = "";
        passwordInput.value = "";
      } else {
        statusEl.textContent = "Save failed: " + (data.error || res.status);
        statusEl.className = "err";
      }
    } catch (e) {
      statusEl.textContent = "Save failed: could not reach the save service.";
      statusEl.className = "err";
    } finally {
      saveBtn.disabled = false;
    }
  });
</script>

</body>
</html>
